spring:
  application:
    name: enrollment
  datasource:
    url: jdbc:mysql://localhost:3306/enrollment?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: appuser
    password: app1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  springdoc:
    swagger-ui:
      path: /swagger-ui.html
    api-docs:
      path: /api-docs

server:
  port: 8080